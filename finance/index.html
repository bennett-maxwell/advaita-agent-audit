<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Dashboard · FKI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0f;
    color: #e0e0e6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .gate-card {
    background: #14141f;
    border: 1px solid #22c55e33;
    border-radius: 20px;
    padding: 40px 36px;
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }
  .icon-wrap {
    width: 64px;
    height: 64px;
    background: #22c55e1a;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }
  h1 {
    font-size: 22px;
    font-weight: 700;
    color: #4ade80;
    text-align: center;
    letter-spacing: -0.3px;
  }
  p.sub {
    font-size: 13px;
    color: #6b7280;
    text-align: center;
    line-height: 1.5;
    margin-top: -12px;
  }
  .input-wrap {
    width: 100%;
    position: relative;
  }
  input[type="password"] {
    width: 100%;
    background: #0f0f1a;
    border: 1px solid #22c55e30;
    border-radius: 10px;
    padding: 13px 48px 13px 16px;
    font-size: 15px;
    color: #e0e0e6;
    outline: none;
    transition: border-color 0.2s;
    font-family: 'SF Mono', 'Fira Code', monospace;
    letter-spacing: 2px;
  }
  input[type="password"]:focus {
    border-color: #22c55e80;
    box-shadow: 0 0 0 3px rgba(34,197,94,0.08);
  }
  input[type="password"].error {
    border-color: #ef4444;
    animation: shake 0.3s ease;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  .toggle-pw {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: #6b7280;
    font-size: 16px;
    padding: 4px;
    line-height: 1;
  }
  .toggle-pw:hover { color: #9ca3af; }

  button.submit {
    width: 100%;
    background: #22c55e;
    color: #000;
    font-size: 15px;
    font-weight: 600;
    border: none;
    border-radius: 10px;
    padding: 13px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  button.submit:hover { background: #16a34a; }
  button.submit:active { transform: scale(0.98); }
  button.submit:disabled { background: #22c55e60; cursor: not-allowed; }

  .error-msg {
    font-size: 13px;
    color: #f87171;
    text-align: center;
    display: none;
  }
  .error-msg.show { display: block; }

  .back-link {
    font-size: 12px;
    color: #4b5563;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: -8px;
  }
  .back-link:hover { color: #9ca3af; }

  .loading {
    display: none;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: #4ade80;
  }
  .loading.show { display: flex; }
  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid #22c55e30;
    border-top-color: #4ade80;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="gate-card">
  <div class="icon-wrap">💰</div>
  <h1>Finance Dashboard</h1>
  <p class="sub">Enter your password to access real-time financials.</p>

  <div class="input-wrap">
    <input type="password" id="pw" placeholder="Password" autofocus autocomplete="current-password" />
    <button class="toggle-pw" type="button" onclick="togglePw()" title="Show/hide">👁</button>
  </div>

  <div class="error-msg" id="errMsg">Incorrect password. Try again.</div>

  <button class="submit" id="submitBtn" onclick="handleSubmit()">Unlock Finance →</button>

  <div class="loading" id="loadingMsg">
    <div class="spinner"></div>
    Redirecting...
  </div>

  <a class="back-link" href="index.html">← Back to Command Center</a>
</div>

<script>
  // SHA-256 password hash.
  const TARGET = 'cffc8ccab05b3b222a00a5c865e5f0edb37dcd9a61bfcd06e63ba00372fbf411';
  const FINANCE_URL = 'https://openclaws-imac.tail503ee0.ts.net:8732';
  const SESSION_KEY = 'fki_finance_auth';

  // Auto-redirect if already authenticated this session
  if (sessionStorage.getItem(SESSION_KEY) === 'ok') {
    window.location.href = FINANCE_URL;
  }

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  async function handleSubmit() {
    const pw = document.getElementById('pw').value;
    if (!pw) return;

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;

    const hash = await sha256(pw);
    if (hash === TARGET) {
      sessionStorage.setItem(SESSION_KEY, 'ok');
      document.getElementById('errMsg').classList.remove('show');
      document.getElementById('loadingMsg').classList.add('show');
      btn.style.display = 'none';
      setTimeout(() => { window.location.href = FINANCE_URL; }, 400);
    } else {
      const input = document.getElementById('pw');
      input.classList.add('error');
      document.getElementById('errMsg').classList.add('show');
      btn.disabled = false;
      setTimeout(() => input.classList.remove('error'), 400);
      input.value = '';
      input.focus();
    }
  }

  document.getElementById('pw').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleSubmit();
  });

  function togglePw() {
    const input = document.getElementById('pw');
    input.type = input.type === 'password' ? 'text' : 'password';
  }
</script>

</body>
</html>
