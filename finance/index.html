<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:,">
<title>Finance Dashboard · FKI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0f;
    color: #e0e0e6;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .gate-card {
    width: min(420px, 100%);
    background: #14141f;
    border: 1px solid #22c55e33;
    border-radius: 20px;
    padding: 36px 30px;
    display: grid;
    gap: 18px;
    text-align: center;
    box-shadow: 0 18px 60px rgba(0,0,0,0.32);
  }
  .icon-wrap {
    width: 64px;
    height: 64px;
    margin: 0 auto;
    background: #22c55e1a;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }
  h1 { font-size: 22px; color: #4ade80; letter-spacing: -0.3px; }
  .sub { color: #8b8b9f; font-size: 13px; line-height: 1.5; }
  .input-wrap { position: relative; }
  input[type="password"], input[type="text"] {
    width: 100%;
    min-height: 48px;
    background: #0f0f1a;
    border: 1px solid #22c55e30;
    border-radius: 10px;
    padding: 13px 48px 13px 16px;
    color: #e0e0e6;
    font-size: 16px;
    outline: none;
    font-family: 'SF Mono', Menlo, monospace;
    letter-spacing: 1px;
  }
  input:focus { border-color: #22c55e80; box-shadow: 0 0 0 3px rgba(34,197,94,0.08); }
  input.error { border-color: #ef4444; animation: shake 0.3s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  .toggle-pw {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    min-width: 44px;
    min-height: 44px;
    border: 0;
    background: transparent;
    color: #8b8b9f;
    cursor: pointer;
    font-size: 15px;
  }
  .submit, .manual-link {
    width: 100%;
    min-height: 48px;
    border: 0;
    border-radius: 10px;
    background: #22c55e;
    color: #06100a;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .submit:disabled { opacity: 0.6; cursor: not-allowed; }
  .manual-link { display: none; background: #18251d; color: #b9f6ca; border: 1px solid #22c55e33; }
  .manual-link.show { display: inline-flex; }
  .error-msg { color: #f87171; font-size: 13px; display: none; }
  .error-msg.show { display: block; }
  .status { color: #8b8b9f; font-size: 12px; line-height: 1.5; min-height: 18px; }
  .back-link { color: #6b7280; font-size: 12px; text-decoration: none; min-height: 44px; display: inline-flex; align-items: center; justify-content: center; }
</style>
</head>
<body>
<main class="gate-card">
  <div class="icon-wrap">💰</div>
  <h1>Finance Dashboard</h1>
  <p class="sub">One password only. Use <strong>finance 2026</strong>.</p>

  <div class="input-wrap">
    <input type="password" id="pw" placeholder="Password" autofocus autocomplete="current-password">
    <button class="toggle-pw" type="button" onclick="togglePw()" aria-label="Show password">Show</button>
  </div>

  <div class="error-msg" id="errMsg">Incorrect password. Try again.</div>
  <button class="submit" id="submitBtn" onclick="handleSubmit()">Unlock Finance</button>
  <a class="manual-link" id="manualLink" href="https://openclaws-imac.tail503ee0.ts.net:8732" rel="noreferrer">Open Live Finance Dashboard</a>
  <div class="status" id="statusMsg">After unlock, this opens the live finance server directly. No second dashboard password is used here.</div>
  <a class="back-link" href="../hub/">Back to Command Center</a>
</main>

<script>
  const TARGET = 'cffc8ccab05b3b222a00a5c865e5f0edb37dcd9a61bfcd06e63ba00372fbf411';
  const FINANCE_URL = 'https://openclaws-imac.tail503ee0.ts.net:8732';
  const SESSION_KEY = 'fki_finance_auth';

  if (sessionStorage.getItem(SESSION_KEY) === 'ok') {
    unlock(false);
  }

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  async function handleSubmit() {
    const input = document.getElementById('pw');
    const password = input.value;
    if (!password) return;
    document.getElementById('submitBtn').disabled = true;
    if (await sha256(password) === TARGET) {
      sessionStorage.setItem(SESSION_KEY, 'ok');
      unlock(true);
    } else {
      input.classList.add('error');
      input.value = '';
      input.focus();
      document.getElementById('errMsg').classList.add('show');
      document.getElementById('submitBtn').disabled = false;
      setTimeout(() => input.classList.remove('error'), 400);
    }
  }

  function unlock(autoOpen) {
    document.getElementById('errMsg').classList.remove('show');
    document.getElementById('manualLink').classList.add('show');
    document.getElementById('submitBtn').style.display = 'none';
    document.getElementById('statusMsg').textContent = 'Unlocked. Opening the live finance dashboard now.';
    if (autoOpen) setTimeout(() => { window.location.href = FINANCE_URL; }, 350);
  }

  function togglePw() {
    const input = document.getElementById('pw');
    const button = document.querySelector('.toggle-pw');
    input.type = input.type === 'password' ? 'text' : 'password';
    button.textContent = input.type === 'password' ? 'Show' : 'Hide';
  }

  document.getElementById('pw').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleSubmit();
  });
</script>
</body>
</html>
