<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Machine Health · FKI</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0a0a0f;
  color: #e0e0e6;
  min-height: 100vh;
  padding: 0 0 40px;
}

/* ── Header ── */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid #ffffff12;
  position: sticky;
  top: 0;
  background: #0a0a0f;
  z-index: 10;
}
.back-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  color: #a0a0b0;
  text-decoration: none;
  font-size: 14px;
  padding: 8px 12px;
  border-radius: 8px;
  min-height: 44px;
  min-width: 44px;
  transition: color 0.2s;
}
.back-btn:hover { color: #e0e0e6; }
.back-btn svg { width: 16px; height: 16px; fill: currentColor; }

.header-center { text-align: center; }
.header-title { font-size: 15px; font-weight: 600; color: #e0e0e6; }
.header-subtitle { font-size: 12px; color: #6b6b7e; margin-top: 2px; }

.refresh-btn {
  background: none;
  border: 1px solid #ffffff20;
  color: #a0a0b0;
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
  min-height: 44px;
  transition: all 0.2s;
}
.refresh-btn:hover { border-color: #ffffff40; color: #e0e0e6; }

/* ── Status banner ── */
.status-banner {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  background: #14141f;
  border-bottom: 1px solid #ffffff0a;
  font-size: 13px;
  color: #6b6b7e;
}
.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dot-green  { background: #22c55e; box-shadow: 0 0 6px #22c55e80; }
.dot-yellow { background: #f59e0b; box-shadow: 0 0 6px #f59e0b80; }
.dot-orange { background: #f97316; box-shadow: 0 0 6px #f9731680; }
.dot-red    { background: #ef4444; box-shadow: 0 0 6px #ef444480; }
.dot-gray   { background: #4b5563; }
.dot-pulse  { animation: pulse 2s infinite; }
@keyframes pulse {
  0%,100% { opacity: 1; }
  50%      { opacity: 0.4; }
}

.demo-badge {
  margin-left: auto;
  background: #f59e0b20;
  color: #f59e0b;
  border: 1px solid #f59e0b40;
  border-radius: 4px;
  padding: 2px 8px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

/* ── Main grid ── */
.main { padding: 20px; }

.section-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #4b5563;
  margin-bottom: 12px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}
@media (min-width: 640px) {
  .grid { grid-template-columns: repeat(2, 1fr); }
}
@media (min-width: 960px) {
  .grid { grid-template-columns: repeat(3, 1fr); }
}

/* ── Machine card ── */
.machine-card {
  background: #14141f;
  border: 1px solid #ffffff1a;
  border-radius: 16px;
  padding: 20px;
  transition: border-color 0.2s, box-shadow 0.2s;
  min-height: 220px;
}
.machine-card.online  { border-color: #22c55e33; }
.machine-card.yellow  { border-color: #f59e0b55; }
.machine-card.orange  { border-color: #f9731655; }
.machine-card.red     { border-color: #ef444466; }
.machine-card.offline { border-color: #ef444433; opacity: 0.7; }
.machine-card:hover   { box-shadow: 0 12px 40px rgba(0,0,0,0.4); }

.card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 16px;
}
.machine-name {
  font-size: 18px;
  font-weight: 700;
  color: #e0e0e6;
  line-height: 1.2;
}
.machine-ip {
  font-size: 12px;
  color: #6b6b7e;
  margin-top: 3px;
  font-family: 'SF Mono', 'Fira Code', monospace;
}
.machine-role {
  font-size: 12px;
  color: #a0a0b0;
  margin-top: 5px;
  line-height: 1.35;
}
.machine-spec {
  font-size: 11px;
  color: #6b6b7e;
  margin-top: 3px;
  line-height: 1.35;
}
.status-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  border-radius: 100px;
  font-size: 12px;
  font-weight: 600;
  flex-shrink: 0;
}
.pill-online  { background: #22c55e20; color: #22c55e; border: 1px solid #22c55e40; }
.pill-offline { background: #ef444420; color: #ef4444; border: 1px solid #ef444440; }
.pill-green   { background: #22c55e20; color: #22c55e; border: 1px solid #22c55e40; }
.pill-yellow  { background: #f59e0b20; color: #f59e0b; border: 1px solid #f59e0b40; }
.pill-orange  { background: #f9731620; color: #fb923c; border: 1px solid #f9731640; }
.pill-red     { background: #ef444420; color: #ef4444; border: 1px solid #ef444440; }

/* ── Metric rows ── */
.metrics { display: flex; flex-direction: column; gap: 10px; }

.metric-row {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.metric-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
}
.metric-label { color: #6b6b7e; }
.metric-note {
  color: #6b6b7e;
  font-size: 11px;
  line-height: 1.35;
}
.metric-value {
  font-weight: 600;
  font-size: 13px;
  font-family: 'SF Mono', 'Fira Code', monospace;
}
.val-green  { color: #22c55e; }
.val-yellow { color: #f59e0b; }
.val-orange { color: #fb923c; }
.val-red    { color: #ef4444; }
.val-gray   { color: #4b5563; }

.progress-bar {
  height: 5px;
  background: #ffffff10;
  border-radius: 100px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 100px;
  transition: width 0.6s ease;
}
.fill-green  { background: linear-gradient(90deg, #16a34a, #22c55e); }
.fill-yellow { background: linear-gradient(90deg, #d97706, #f59e0b); }
.fill-orange { background: linear-gradient(90deg, #ea580c, #fb923c); }
.fill-red    { background: linear-gradient(90deg, #dc2626, #ef4444); }
.fill-gray   { background: #374151; }

.legend {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 8px;
  margin: 0 0 16px;
}
.legend-card {
  min-height: 74px;
  padding: 10px;
  border: 1px solid #ffffff12;
  border-radius: 12px;
  background: #14141f;
}
.legend-title {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 4px;
}
.legend-copy {
  color: #8b8b9f;
  font-size: 11px;
  line-height: 1.35;
}

/* ── Uptime + last-seen footer ── */
.card-footer {
  margin-top: 16px;
  padding-top: 12px;
  border-top: 1px solid #ffffff0a;
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: #4b5563;
}

/* ── Updated row ── */
.updated-row {
  text-align: center;
  font-size: 12px;
  color: #4b5563;
  margin-top: 20px;
}
@media (max-width: 640px) {
  .top-bar { padding: 12px; gap: 8px; }
  .back-btn, .refresh-btn { padding: 8px 10px; }
  .main { padding: 14px; }
  .legend { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- Top bar -->
<div class="top-bar">
  <a class="back-btn" href="index.html">
    <svg viewBox="0 0 20 20"><path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd"/></svg>
    Hub
  </a>
  <div class="header-center">
    <div class="header-title">💻 Machine Health</div>
    <div class="header-subtitle">Auto-refresh · 60s</div>
  </div>
  <button class="refresh-btn" onclick="loadData()">↺ Refresh</button>
</div>

<!-- Status banner -->
<div class="status-banner" id="statusBanner">
  <div class="status-dot dot-gray dot-pulse" id="bannerDot"></div>
  <span id="bannerText">Loading…</span>
</div>

<!-- Main -->
<div class="main">
  <div class="section-label">Machine Status Guide</div>
  <div class="legend" aria-label="Machine health color guide">
    <div class="legend-card"><div class="legend-title"><span class="status-dot dot-green"></span>Green</div><div class="legend-copy">Safe. Keep working.</div></div>
    <div class="legend-card"><div class="legend-title"><span class="status-dot dot-yellow"></span>Yellow</div><div class="legend-copy">May slow down. Consider cleanup soon.</div></div>
    <div class="legend-card"><div class="legend-title"><span class="status-dot dot-orange"></span>Orange</div><div class="legend-copy">Very slow but usable. Clean up now.</div></div>
    <div class="legend-card"><div class="legend-title"><span class="status-dot dot-red"></span>Red</div><div class="legend-copy">Not useful until reset or intervention.</div></div>
  </div>
  <div class="section-label">FKI Network — 3 Computers</div>
  <div class="grid" id="machineGrid">
    <!-- Cards injected by JS -->
  </div>
  <div class="updated-row" id="updatedRow"></div>
</div>

<script>
// ── Fallback data (shown when all fetches fail) ────────────────────────────
const FALLBACK_DATA = {
  "updated": "2026-04-29T20:00:00Z",
  "machines": [
    {"id":"imac","name":"Ivan iMac","ip":"100.103.51.12","online":true,"cpu":22,"mem":54,"disk":61,"uptime":"12 days","last_seen":"2026-04-29T20:00:00Z","role":"Primary AI host","spec":"40GB RAM · Intel i5 · LaunchAgents + dashboard deploys"},
    {"id":"macbook","name":"Mack MacBook","ip":"100.112.24.104","online":true,"cpu":35,"mem":68,"disk":72,"uptime":"1 day","last_seen":"2026-04-29T20:00:00Z","role":"Bennett MacBook / strategy workstation","spec":"24GB RAM · M4 · Codex + desktop tools"},
    {"id":"tiffany","name":"Tiffany HP Omen","ip":"100.91.17.106","online":false,"cpu":null,"mem":null,"disk":null,"uptime":"offline","last_seen":"unknown","role":"Local AI compute node","spec":"128GB RAM · Ollama HTTP only · no SSH","metrics_available":false}
  ]
};

const MACHINE_META = {
  imac: {
    name: "Ivan iMac",
    role: "Primary AI host",
    spec: "40GB RAM · Intel i5 · LaunchAgents + dashboard deploys"
  },
  macbook: {
    name: "Mack MacBook",
    role: "Bennett MacBook / strategy workstation",
    spec: "24GB RAM · M4 · Codex + desktop tools"
  },
  tiffany: {
    name: "Tiffany HP Omen",
    role: "Local AI compute node",
    spec: "128GB RAM · Ollama HTTP only · no SSH"
  }
};

const THRESHOLDS = {
  cpu:  { green: 50, yellow: 75, orange: 90 },
  mem:  { green: 60, yellow: 80, orange: 90 },
  swap: { green: 25, yellow: 50, orange: 70 },
  disk: { green: 70, yellow: 85, orange: 95 }
};

const HEALTH_COPY = {
  green: "Safe",
  yellow: "May slow",
  orange: "Very slow",
  red: "Reset / intervene",
  gray: "No live metric"
};

// ── Fetch URLs — primary (8800), CF Tunnel, Tailscale ─────────────────────
const DATA_URLS = [
  "machine-health.json",
  "/hub/machine-health.json",
  "http://openclaws-imac.tail503ee0.ts.net:8800/machine-health.json",
  "https://fkicommand.com/machine-health.json",
  "http://100.103.51.12:8800/machine-health.json"
];

let isDemo = false;
let refreshTimer = null;

async function fetchWithTimeout(url) {
  const ctrl = new AbortController();
  const timer = AbortSignal.timeout(5000);
  const merged = AbortSignal.any
    ? AbortSignal.any([ctrl.signal, timer])
    : timer;
  const resp = await fetch(url, { signal: merged });
  if (!resp.ok) throw new Error("HTTP " + resp.status);
  return resp.json();
}

async function loadData() {
  setBanner("loading");
  let data = null;
  for (const url of DATA_URLS) {
    try {
      data = await fetchWithTimeout(url);
      isDemo = false;
      break;
    } catch(e) {
      // try next
    }
  }
  if (!data) {
    data = FALLBACK_DATA;
    isDemo = true;
  }
  render(data);
  scheduleRefresh();
}

function scheduleRefresh() {
  if (refreshTimer) clearTimeout(refreshTimer);
  refreshTimer = setTimeout(loadData, 60000);
}

// ── Color helpers ─────────────────────────────────────────────────────────
function pctClass(metric, v) {
  if (v === null || v === undefined || Number.isNaN(Number(v))) return "gray";
  const limits = THRESHOLDS[metric] || THRESHOLDS.cpu;
  const n = Number(v);
  if (n <= limits.green) return "green";
  if (n <= limits.yellow) return "yellow";
  if (n <= limits.orange) return "orange";
  return "red";
}

function worstLevel(levels) {
  const order = ["gray", "green", "yellow", "orange", "red"];
  return levels.reduce((worst, level) => order.indexOf(level) > order.indexOf(worst) ? level : worst, "green");
}

function fmtPct(metric, v, online) {
  if (!online) return '<span class="metric-value val-gray">—</span>';
  const cls = pctClass(metric, v);
  if (cls === "gray") return '<span class="metric-value val-gray">N/A</span>';
  return `<span class="metric-value val-${cls}">${v}% · ${HEALTH_COPY[cls]}</span>`;
}

function progressBar(metric, v, online) {
  if (!online) return `<div class="progress-bar"><div class="progress-fill fill-gray" style="width:0%"></div></div>`;
  const cls = pctClass(metric, v);
  const width = cls === "gray" ? 0 : Number(v);
  return `<div class="progress-bar"><div class="progress-fill fill-${cls}" style="width:${width}%"></div></div>`;
}

function machineLevels(m) {
  return ["cpu", "mem", "swap", "disk"]
    .filter(metric => m[metric] !== undefined)
    .map(metric => pctClass(metric, m[metric]));
}

// ── Render ────────────────────────────────────────────────────────────────
function render(data) {
  const grid = document.getElementById("machineGrid");
  grid.innerHTML = data.machines.map(m => cardHTML(m)).join("");

  // Updated row
  const upd = new Date(data.updated);
  const ago = Math.round((Date.now() - upd.getTime()) / 1000);
  const agoStr = ago < 60 ? `${ago}s ago` : ago < 3600 ? `${Math.round(ago/60)}m ago` : `${Math.round(ago/3600)}h ago`;
  document.getElementById("updatedRow").textContent = `Data collected ${agoStr} · ${isDemo ? "DEMO" : upd.toLocaleTimeString()}`;

  // Banner
  const online = data.machines.filter(m => m.online).length;
  const total  = data.machines.length;
  const levels = data.machines.filter(m => m.online).flatMap(m => machineLevels(m));
  const worst = worstLevel(levels);
  if (isDemo) {
    setBanner("demo");
  } else if (online === total && worst === "green") {
    setBanner("green");
  } else if (online < total) {
    setBanner("partial", online, total);
  } else if (worst === "yellow") {
    setBanner("warning");
  } else if (worst === "orange") {
    setBanner("orange");
  } else {
    setBanner("red");
  }
}

function cardHTML(m) {
  const meta = MACHINE_META[m.id] || {};
  const displayName = m.name === "iMac" || m.name === "MacBook" || m.name === "Tiffany" ? (meta.name || m.name) : m.name;
  const levels = machineLevels(m);
  const cardLevel = m.online ? worstLevel(levels) : "offline";
  const statusClass = m.online ? `${cardLevel} online` : "offline";
  const pillLevel = m.online ? cardLevel : "red";
  const pill = m.online
    ? `<span class="status-pill pill-${pillLevel}"><span class="status-dot dot-${pillLevel}"></span>${HEALTH_COPY[pillLevel] || "Online"}</span>`
    : `<span class="status-pill pill-offline"><span class="status-dot dot-red"></span>Offline</span>`;

  const lastSeen = m.last_seen === "unknown" ? "unknown"
    : (() => { try { return new Date(m.last_seen).toLocaleTimeString(); } catch(e) { return m.last_seen; } })();

  return `
  <div class="machine-card ${statusClass}">
    <div class="card-top">
      <div>
        <div class="machine-name">${displayName}</div>
        <div class="machine-ip">${m.ip}</div>
        <div class="machine-role">${m.role || meta.role || ""}</div>
        <div class="machine-spec">${m.spec || meta.spec || ""}</div>
      </div>
      ${pill}
    </div>
    <div class="metrics">
      <div class="metric-row">
        <div class="metric-header">
          <span class="metric-label">CPU</span>
          ${fmtPct("cpu", m.cpu, m.online)}
        </div>
        ${progressBar("cpu", m.cpu, m.online)}
      </div>
      <div class="metric-row">
        <div class="metric-header">
          <span class="metric-label">Memory</span>
          ${fmtPct("mem", m.mem, m.online)}
        </div>
        ${progressBar("mem", m.mem, m.online)}
      </div>
      ${m.swap !== undefined ? `
      <div class="metric-row">
        <div class="metric-header">
          <span class="metric-label">Swap</span>
          ${fmtPct("swap", m.swap, m.online)}
        </div>
        ${progressBar("swap", m.swap, m.online)}
      </div>` : ""}
      <div class="metric-row">
        <div class="metric-header">
          <span class="metric-label">Disk</span>
          ${fmtPct("disk", m.disk, m.online)}
        </div>
        ${progressBar("disk", m.disk, m.online)}
      </div>
      ${m.metrics_available === false ? `<div class="metric-note">Tiffany is checked by Ollama HTTP. CPU/RAM/Disk need a Windows health endpoint before those metrics can be live.</div>` : ""}
    </div>
    <div class="card-footer">
      <span>↑ ${m.uptime}</span>
      <span>Seen ${lastSeen}</span>
    </div>
  </div>`;
}

function setBanner(state, online, total) {
  const dot  = document.getElementById("bannerDot");
  const text = document.getElementById("bannerText");
  const banner = document.getElementById("statusBanner");
  const demoEl = banner.querySelector(".demo-badge");
  if (demoEl) demoEl.remove();

  dot.className = "status-dot";

  if (state === "loading") {
    dot.className += " dot-gray dot-pulse";
    text.textContent = "Loading machine data…";
  } else if (state === "green") {
    dot.className += " dot-green";
    text.textContent = "All systems healthy";
  } else if (state === "warning") {
    dot.className += " dot-yellow";
    text.textContent = "Yellow resource usage: cleanup may be needed soon";
  } else if (state === "orange") {
    dot.className += " dot-orange";
    text.textContent = "Orange resource usage: machine is very slow but still usable";
  } else if (state === "red") {
    dot.className += " dot-red";
    text.textContent = "Red resource usage: reset or intervention needed";
  } else if (state === "partial") {
    dot.className += " dot-yellow";
    text.textContent = `${online}/${total} machines online`;
  } else if (state === "demo") {
    dot.className += " dot-yellow";
    text.textContent = "Live data unavailable";
    const badge = document.createElement("span");
    badge.className = "demo-badge";
    badge.textContent = "DEMO DATA";
    banner.appendChild(badge);
  }
}

// ── Boot ──────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
