<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Monitor · FKI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0f;
    color: #e0e0e6;
    min-height: 100vh;
    padding: 24px 16px 40px;
  }
  .page { max-width: 1100px; margin: 0 auto; }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 28px;
  }
  .header-left h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.4px;
    background: linear-gradient(135deg, #a78bfa, #60a5fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header-left p {
    font-size: 12px;
    color: #4b5563;
    margin-top: 2px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .refresh-btn {
    background: #1e1e2e;
    border: 1px solid #2d2d3e;
    color: #9ca3af;
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.2s, color 0.2s;
  }
  .refresh-btn:hover { background: #2d2d3e; color: #e0e0e6; }
  .refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .last-updated {
    font-size: 11px;
    color: #374151;
    font-family: 'SF Mono', monospace;
  }
  .back-link {
    font-size: 12px;
    color: #4b5563;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .back-link:hover { color: #9ca3af; }

  /* ── Section label ── */
  .section-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: #4b5563;
    margin-bottom: 12px;
    margin-top: 28px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #1e1e2e;
  }

  /* ── Agent Grid ── */
  .agent-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
  }
  @media (min-width: 600px) {
    .agent-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (min-width: 900px) {
    .agent-grid { grid-template-columns: repeat(3, 1fr); }
  }

  .agent-card {
    background: #14141f;
    border: 1px solid #1e1e2e;
    border-radius: 14px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    position: relative;
    transition: border-color 0.2s;
  }
  .agent-card.active  { border-color: #22c55e40; }
  .agent-card.idle    { border-color: #f59e0b30; }
  .agent-card.offline { border-color: #ef444430; }
  .agent-card.unknown { border-color: #6b728030; }

  /* Agent header row */
  .agent-top {
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .agent-avatar {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .mack-color    { background: #7c3aed20; }
  .leo-color     { background: #0891b220; }
  .ivan-color    { background: #16a34a20; }
  .tiffany-color { background: #db277720; }
  .chad-color    { background: #ea580c20; }

  .agent-meta { flex: 1; min-width: 0; }
  .agent-name {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.2px;
  }
  .mack-color-text    { color: #a78bfa; }
  .leo-color-text     { color: #22d3ee; }
  .ivan-color-text    { color: #4ade80; }
  .tiffany-color-text { color: #f472b6; }
  .chad-color-text    { color: #fb923c; }
  .reed-color     { background: #0d948820; }
  .reed-color-text    { color: #2dd4bf; }

  .agent-model {
    font-size: 10px;
    color: #4b5563;
    font-family: 'SF Mono', monospace;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Status badge */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 20px;
    flex-shrink: 0;
  }
  .badge-active  { background: #22c55e15; color: #4ade80; border: 1px solid #22c55e30; }
  .badge-idle    { background: #f59e0b15; color: #fbbf24; border: 1px solid #f59e0b30; }
  .badge-offline { background: #ef444415; color: #f87171; border: 1px solid #ef444430; }
  .badge-unknown { background: #6b728015; color: #9ca3af; border: 1px solid #6b728030; }
  .badge-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: currentColor;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* Task slots */
  .task-slots-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .slots-label {
    font-size: 10px;
    color: #6b7280;
    width: 68px;
    flex-shrink: 0;
  }
  .slots {
    display: flex;
    gap: 4px;
    flex: 1;
  }
  .slot {
    flex: 1;
    height: 6px;
    border-radius: 3px;
    background: #1e1e2e;
  }
  .slot.used.active-agent   { background: #22c55e; }
  .slot.used.idle-agent     { background: #f59e0b; }
  .slot.used.offline-agent  { background: #ef4444; }
  .slot.used.unknown-agent  { background: #6b7280; }
  .slots-count {
    font-size: 11px;
    color: #6b7280;
    font-family: 'SF Mono', monospace;
    flex-shrink: 0;
  }

  /* Info rows */
  .info-rows { display: flex; flex-direction: column; gap: 7px; }
  .info-row {
    display: flex;
    gap: 8px;
    font-size: 11px;
  }
  .info-key {
    color: #4b5563;
    flex-shrink: 0;
    width: 68px;
  }
  .info-val {
    color: #9ca3af;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .info-val.active-text { color: #e0e0e6; }
  .info-val.highlight   { color: #a78bfa; }
  .info-val.green       { color: #4ade80; }
  .info-val.amber       { color: #fbbf24; }
  .info-val.pink        { color: #f472b6; }
  .info-val.orange      { color: #fb923c; }

  /* Current task pill */
  .current-task {
    background: #0f0f1a;
    border: 1px solid #2d2d3e;
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 11px;
    color: #9ca3af;
    line-height: 1.5;
    min-height: 36px;
    word-break: break-word;
  }
  .current-task.has-task { color: #e0e0e6; border-color: #3d3d5e; }
  .current-task .task-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #4b5563;
    margin-bottom: 3px;
    display: block;
  }

  /* ── Handoff Queue ── */
  .handoff-table-wrap {
    background: #14141f;
    border: 1px solid #1e1e2e;
    border-radius: 14px;
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #4b5563;
    padding: 12px 16px 10px;
    border-bottom: 1px solid #1e1e2e;
    background: #0f0f1a;
  }
  td {
    padding: 10px 16px;
    font-size: 12px;
    color: #9ca3af;
    border-bottom: 1px solid #1a1a2a;
  }
  tr:last-child td { border-bottom: none; }
  td:first-child { color: #e0e0e6; }
  .empty-row td {
    text-align: center;
    color: #374151;
    padding: 20px;
    font-style: italic;
  }
  .dir-arrow { color: #4b5563; padding: 0 4px; }

  /* ── System Health ── */
  .health-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }
  @media (min-width: 600px) {
    .health-grid { grid-template-columns: repeat(4, 1fr); }
  }
  .health-tile {
    background: #14141f;
    border: 1px solid #1e1e2e;
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .health-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #4b5563;
  }
  .health-val {
    font-size: 22px;
    font-weight: 700;
    font-family: 'SF Mono', monospace;
    letter-spacing: -1px;
  }
  .health-sub { font-size: 10px; color: #4b5563; }
  .green-text  { color: #4ade80; }
  .amber-text  { color: #fbbf24; }
  .red-text    { color: #f87171; }
  .blue-text   { color: #60a5fa; }
  .purple-text { color: #a78bfa; }

  /* Cron list */
  .cron-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
  }
  .cron-pill {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    background: #22c55e15;
    color: #4ade80;
    border: 1px solid #22c55e25;
  }

  /* Data source note */
  .data-note {
    font-size: 10px;
    color: #374151;
    text-align: center;
    margin-top: 24px;
    font-family: 'SF Mono', monospace;
  }
  .data-note a { color: #4b5563; }
</style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <h1>🤖 Agent Monitor</h1>
      <p>FKI AI Fleet · Mack · Leo · Ivan · Tiffany · Chad</p>
    </div>
    <div class="header-right">
      <a class="back-link" href="index.html">← HQ</a>
      <span class="last-updated" id="lastUpdated">—</span>
      <button class="refresh-btn" id="refreshBtn" onclick="loadData()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M23 4v6h-6M1 20v-6h6"/>
          <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
        </svg>
        Refresh
      </button>
    </div>
  </div>

  <!-- Agents -->
  <div class="section-label">Agents</div>
  <div class="agent-grid" id="agentGrid">
    <!-- populated by JS -->
  </div>

  <!-- Handoff Queue -->
  <div class="section-label">Handoff Queue</div>
  <div class="handoff-table-wrap">
    <table>
      <thead>
        <tr>
          <th>From</th>
          <th></th>
          <th>To</th>
          <th>Task</th>
          <th>Status</th>
          <th>Time</th>
        </tr>
      </thead>
      <tbody id="handoffBody">
        <tr class="empty-row"><td colspan="6">No pending handoffs</td></tr>
      </tbody>
    </table>
  </div>

  <!-- System Health -->
  <div class="section-label">System Health · Ivan iMac</div>
  <div class="health-grid" id="healthGrid">
    <!-- populated by JS -->
  </div>

  <div class="data-note" id="dataNote">
    Data source: <a href="https://bennett-maxwell.github.io/advaita-agent-audit/hub/agent-status.json">GitHub Pages (live)</a> · Auto-refresh 60s
  </div>

</div>

<script>
// ── Static fallback (shown when Ivan status.json unavailable) ──

    claude_sessions_mack: 1,
    claude_sessions_ivan: 2
  }
};

// GH Pages first (no Tailscale required), CF Tunnel second, Tailscale fallback
const STATUS_FETCH_URLS = [
  'https://dashboard.franchiseki.com/hub/agent-status.json',
  'https://bennett-maxwell.github.io/advaita-agent-audit/hub/agent-status.json',
  'http://openclaws-imac.tail503ee0.ts.net:8800/agent-status.json'
];
let autoTimer;

function statusBadge(status) {
  const map = {
    active:  ['badge-active',  'Active'],
    idle:    ['badge-idle',    'Idle'],
    offline: ['badge-offline', 'Offline'],
    unknown: ['badge-unknown', '?? Unknown']
  };
  const [cls, label] = map[status] || map.unknown;
  return `<span class="status-badge ${cls}"><span class="badge-dot"></span>${label}</span>`;
}

function taskSlots(running, max, status) {
  let html = '';
  for (let i = 0; i < max; i++) {
    const used = i < running ? `used ${status}-agent` : '';
    html += `<div class="slot ${used}"></div>`;
  }
  return html;
}

function renderAgents(agents) {
  const grid = document.getElementById('agentGrid');
  grid.innerHTML = agents.map(a => {
    const taskText = a.current_task
      ? `<span class="task-label">Current task</span>${a.current_task}`
      : `<span class="task-label">Current task</span><span style="color:#374151;font-style:italic;">No active task</span>`;
    const skillVal = a.current_skill
      ? `<span class="info-val active-text">${a.current_skill}</span>`
      : `<span class="info-val" style="font-style:italic;color:#374151;">—</span>`;
    const notionVal = a.notion_project
      ? `<span class="info-val highlight">${a.notion_project}</span>`
      : `<span class="info-val" style="font-style:italic;color:#374151;">—</span>`;

    return `
      <div class="agent-card ${a.status}">
        <div class="agent-top">
          <div class="agent-avatar ${a.color_class}">${a.emoji}</div>
          <div class="agent-meta">
            <div class="agent-name ${a.text_class}">${a.name}</div>
            <div class="agent-model">${a.model}</div>
          </div>
          ${statusBadge(a.status)}
        </div>

        <div class="task-slots-row">
          <span class="slots-label">Tasks (${a.tasks_running}/${a.tasks_max})</span>
          <div class="slots">${taskSlots(a.tasks_running, a.tasks_max, a.status)}</div>
          <span class="slots-count">${a.tasks_running}/${a.tasks_max}</span>
        </div>

        <div class="current-task ${a.current_task ? 'has-task' : ''}">${taskText}</div>

        <div class="info-rows">
          <div class="info-row">
            <span class="info-key">Skill</span>
            ${skillVal}
          </div>
          <div class="info-row">
            <span class="info-key">Notion</span>
            ${notionVal}
          </div>
          <div class="info-row">
            <span class="info-key">Last active</span>
            <span class="info-val">${a.last_active_rel}</span>
          </div>
          <div class="info-row">
            <span class="info-key">Memory</span>
            <span class="info-val">${a.memory_updated_rel}</span>
          </div>
          <div class="info-row">
            <span class="info-key">Machine</span>
            <span class="info-val" style="color:#4b5563;">${a.machine}</span>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function renderHandoffs(handoffs) {
  const tbody = document.getElementById('handoffBody');
  if (!handoffs || handoffs.length === 0) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="6">No pending handoffs</td></tr>';
    return;
  }
  tbody.innerHTML = handoffs.map(h => `
    <tr>
      <td>${h.from}</td>
      <td class="dir-arrow">→</td>
      <td>${h.to}</td>
      <td>${h.task}</td>
      <td><span class="status-badge ${h.status === 'pending' ? 'badge-idle' : 'badge-active'}">${h.status}</span></td>
      <td style="font-family:monospace;font-size:10px;color:#4b5563;">${h.time_rel}</td>
    </tr>
  `).join('');
}

function renderHealth(sys) {
  if (!sys) return;
  const grid = document.getElementById('healthGrid');

  function cpuColor(v)  { return v > 80 ? 'red-text' : v > 50 ? 'amber-text' : 'green-text'; }
  function ramColor(v)  { return v > 85 ? 'red-text' : v > 65 ? 'amber-text' : 'blue-text'; }
  function diskColor(v) { return v > 85 ? 'red-text' : v > 70 ? 'amber-text' : 'green-text'; }

  const cronPills = (sys.active_cron_names || []).map(c =>
    `<span class="cron-pill">${c}</span>`
  ).join('');

  grid.innerHTML = `
    <div class="health-tile">
      <div class="health-label">Ivan CPU</div>
      <div class="health-val ${cpuColor(sys.ivan_cpu_pct)}">${sys.ivan_cpu_pct}%</div>
      <div class="health-sub">iMac (OpenClaw)</div>
    </div>
    <div class="health-tile">
      <div class="health-label">Ivan RAM</div>
      <div class="health-val ${ramColor(sys.ivan_ram_pct)}">${sys.ivan_ram_pct}%</div>
      <div class="health-sub">Memory used</div>
    </div>
    <div class="health-tile">
      <div class="health-label">Ivan Disk</div>
      <div class="health-val ${diskColor(sys.ivan_disk_pct)}">${sys.ivan_disk_pct}%</div>
      <div class="health-sub">Disk used</div>
    </div>
    <div class="health-tile">
      <div class="health-label">Mack Swap</div>
      <div class="health-val ${sys.mack_swap_gb > 8 ? 'red-text' : sys.mack_swap_gb > 4 ? 'amber-text' : 'green-text'}">${sys.mack_swap_gb}G</div>
      <div class="health-sub">MacBook swap</div>
    </div>
    <div class="health-tile">
      <div class="health-label">Active Crons</div>
      <div class="health-val purple-text">${sys.active_crons}</div>
      <div class="health-sub">On Ivan</div>
    </div>
    <div class="health-tile">
      <div class="health-label">Claude Sessions</div>
      <div class="health-val blue-text">${(sys.claude_sessions_mack || 0) + (sys.claude_sessions_ivan || 0)}</div>
      <div class="health-sub">Mack:${sys.claude_sessions_mack||0} Ivan:${sys.claude_sessions_ivan||0}</div>
    </div>
    <div class="health-tile" style="grid-column: span 2;">
      <div class="health-label">Cron Roster</div>
      <div class="cron-list">${cronPills || '<span style="color:#374151;font-style:italic;font-size:11px;">No crons listed</span>'}</div>
    </div>
  `;
}

function setLastUpdated(iso, demo) {
  const el = document.getElementById('lastUpdated');
  const dt = new Date(iso);
  const str = dt.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', timeZoneName: 'short', timeZone: 'America/Denver' });
  el.textContent = (demo ? '⚠ demo · ' : '✓ ') + str;
  el.style.color = demo ? '#f59e0b' : '#22c55e';
}

async function loadData() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');

  let data = null;
  let usedUrl = null;
  for (const url of STATUS_FETCH_URLS) {
    try {
      const res = await fetch(url, { signal: AbortSignal.timeout(5000) });
      if (res.ok) { data = await res.json(); usedUrl = url; break; }
    } catch (_) { /* try next */ }
  }

  if (!data) {
    data = FALLBACK;
    data.updated = new Date().toISOString();
    document.getElementById('dataNote').innerHTML =
      '⚠ Ivan unreachable — showing demo data. Connect to Tailscale or check <a href="https://dashboard.franchiseki.com" style="color:#4b5563;">dashboard.franchiseki.com</a>';
  } else {
    const label = usedUrl.includes('franchiseki.com') ? 'dashboard.franchiseki.com' : 'Ivan:8800 (Tailscale)';
    document.getElementById('dataNote').innerHTML =
      '✓ Live data via <a href="' + usedUrl + '" style="color:#4b5563;">' + label + '</a> · Auto-refresh 60s';
  }

  renderAgents(data.agents || []);
  renderHandoffs(data.handoffs || []);
  renderHealth(data.system || null);
  setLastUpdated(data.updated, data.demo_mode || !data);

  btn.classList.remove('spinning');
  clearTimeout(autoTimer);
  autoTimer = setTimeout(loadData, 60000);
}

// Init
loadData();
</script>
</body>
</html>
