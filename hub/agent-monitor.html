<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Command Center · FKI</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0a0a0f; color: #e0e0e6; min-height: 100vh; padding: 20px 16px 48px;
}
.page { max-width: 1100px; margin: 0 auto; }

/* Header */
.header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 22px; }
.header-left h1 { font-size: 21px; font-weight: 700; letter-spacing: -0.4px; background: linear-gradient(135deg, #a78bfa, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.header-left p { font-size: 11px; color: #4b5563; margin-top: 2px; }
.header-right { display: flex; align-items: center; gap: 8px; }
.refresh-btn { background: #1e1e2e; border: 1px solid #2d2d3e; color: #9ca3af; border-radius: 8px; padding: 7px 14px; font-size: 12px; cursor: pointer; transition: background 0.15s; }
.refresh-btn:hover { background: #2d2d3e; color: #e0e0e6; }
.back-link { font-size: 12px; color: #4b5563; text-decoration: none; }
.back-link:hover { color: #9ca3af; }
.last-updated { font-size: 11px; color: #374151; font-family: 'SF Mono', monospace; }

/* Priority Board */
.priority-board { background: linear-gradient(135deg, rgba(79,142,247,0.07), rgba(168,85,247,0.04)); border: 1px solid rgba(79,142,247,0.2); border-radius: 14px; padding: 14px; margin-bottom: 6px; }
.priority-board-title { font-size: 10px; font-weight: 700; color: #4b5563; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }
.priority-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(42,47,62,0.5); }
.priority-item:last-child { border-bottom: none; }
.priority-num { width: 22px; height: 22px; border-radius: 50%; background: #4f8ef7; color: #fff; font-size: 10px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
.priority-urgent .priority-num { background: #ef4444; }
.priority-info .priority-num { background: #22c55e; }
.priority-title { font-size: 13px; font-weight: 600; }
.priority-sub { font-size: 11px; color: #4b5563; margin-top: 2px; }
.priority-all-clear { font-size: 13px; color: #22c55e; text-align: center; padding: 8px; }

/* Section label */
.section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: #4b5563; margin-bottom: 12px; margin-top: 24px; display: flex; align-items: center; gap: 8px; }
.section-label::after { content: ''; flex: 1; height: 1px; background: #1e1e2e; }

/* Agent Grid */
.agent-grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
@media (min-width: 600px) { .agent-grid { grid-template-columns: repeat(2, 1fr); } }
@media (min-width: 900px) { .agent-grid { grid-template-columns: repeat(3, 1fr); } }

/* Agent Card */
.agent-card { background: #14141f; border: 1px solid #1e1e2e; border-radius: 14px; padding: 18px; display: flex; flex-direction: column; gap: 11px; transition: border-color 0.2s; }
.agent-card.active  { border-color: rgba(34,197,94,0.2); }
.agent-card.idle    { border-color: rgba(245,158,11,0.15); }
.agent-card.offline { border-color: rgba(239,68,68,0.2); }
.agent-card.unknown { border-color: rgba(107,114,128,0.15); }
.agent-top { display: flex; align-items: flex-start; gap: 10px; }
.agent-avatar { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.mack-color    { background: rgba(124,58,237,0.12); }
.leo-color     { background: rgba(8,145,178,0.12); }
.ivan-color    { background: rgba(22,163,74,0.12); }
.tiffany-color { background: rgba(219,39,119,0.12); }
.chad-color    { background: rgba(234,88,12,0.12); }
.reed-color    { background: rgba(13,148,136,0.12); }
.hyper-color   { background: rgba(124,58,237,0.15); border: 1px solid rgba(124,58,237,0.2); }
.mack-color-text    { color: #a78bfa; }
.leo-color-text     { color: #22d3ee; }
.ivan-color-text    { color: #4ade80; }
.tiffany-color-text { color: #f472b6; }
.chad-color-text    { color: #fb923c; }
.reed-color-text    { color: #2dd4bf; }
.hyper-color-text   { color: #c084fc; }
.agent-meta { flex: 1; min-width: 0; }
.agent-name { font-size: 14px; font-weight: 700; }
.agent-model { font-size: 10px; color: #4b5563; font-family: 'SF Mono', monospace; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.status-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 500; padding: 3px 8px; border-radius: 20px; flex-shrink: 0; }
.badge-active  { background: rgba(34,197,94,0.08); color: #4ade80; border: 1px solid rgba(34,197,94,0.2); }
.badge-idle    { background: rgba(245,158,11,0.08); color: #fbbf24; border: 1px solid rgba(245,158,11,0.2); }
.badge-offline { background: rgba(239,68,68,0.08); color: #f87171; border: 1px solid rgba(239,68,68,0.2); }
.badge-unknown { background: rgba(107,114,128,0.08); color: #9ca3af; border: 1px solid rgba(107,114,128,0.2); }
.badge-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* Task slots */
.task-slots-row { display: flex; align-items: center; gap: 8px; }
.slots-label { font-size: 10px; color: #374151; white-space: nowrap; }
.slots { display: flex; gap: 4px; flex: 1; }
.slot { height: 5px; flex: 1; border-radius: 3px; background: #1e1e2e; }
.slot.used.active-agent  { background: rgba(34,197,94,0.5); }
.slot.used.idle-agent    { background: rgba(245,158,11,0.4); }
.slot.used.offline-agent { background: rgba(239,68,68,0.4); }
.slot.used.unknown-agent { background: rgba(107,114,128,0.4); }
.slots-count { font-size: 10px; color: #374151; font-family: 'SF Mono', monospace; }

/* Current task */
.current-task { font-size: 12px; line-height: 1.5; color: #4b5563; padding: 8px 10px; background: #1a1a28; border-radius: 8px; min-height: 34px; }
.current-task .task-label { font-size: 9px; font-weight: 700; color: #374151; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 3px; }
.current-task.has-task { color: #9ca3af; }

/* Info rows */
.info-rows { display: flex; flex-direction: column; gap: 4px; }
.info-row { display: flex; gap: 6px; align-items: baseline; font-size: 11px; }
.info-key { font-size: 10px; font-weight: 700; color: #374151; text-transform: uppercase; letter-spacing: 0.5px; min-width: 70px; flex-shrink: 0; }
.info-val { color: #9ca3af; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.info-val.active-text { color: #a78bfa; }
.info-val.highlight { color: #60a5fa; }

/* Panel row */
.panel-row { display: flex; gap: 6px; }
.panel-btn { flex: 1; background: #1a1a28; border: 1px solid #252535; color: #6b7280; border-radius: 8px; padding: 7px 10px; font-size: 11px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: space-between; transition: background 0.15s, border-color 0.15s, color 0.15s; min-height: 34px; }
.panel-btn:hover { background: #252535; color: #e0e0e6; border-color: #2d2d3e; }
.panel-btn.open { background: #252535; border-color: rgba(79,142,247,0.3); color: #e0e0e6; }
.panel-btn .chevron { font-size: 9px; color: #374151; transition: transform 0.2s; }
.panel-btn.open .chevron { transform: rotate(180deg); }

/* Panel body */
.panel-body { display: none; padding-top: 10px; }
.panel-body.visible { display: block; }

/* Task list */
.task-list { display: flex; flex-direction: column; gap: 5px; margin-bottom: 8px; }
.task-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; background: #1a1a28; border: 1px solid #252535; border-radius: 8px; font-size: 12px; }
.task-item.done { opacity: 0.45; }
.task-item.done .task-item-title { text-decoration: line-through; color: #374151; }
.task-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.task-dot.pending { background: #f59e0b; }
.task-dot.active  { background: #22c55e; animation: pulse 2s infinite; }
.task-dot.done    { background: #374151; }
.task-item-title { flex: 1; color: #d1d5db; line-height: 1.4; word-break: break-word; }
.task-action { background: none; border: none; cursor: pointer; color: #374151; font-size: 13px; padding: 2px 5px; border-radius: 4px; flex-shrink: 0; transition: color 0.15s, background 0.15s; }
.task-action:hover { background: #252535; }
.task-action.complete:hover { color: #22c55e; }
.task-action.delete:hover   { color: #ef4444; }
.task-empty { font-size: 11px; color: #374151; text-align: center; padding: 8px 0; font-style: italic; }

/* Add task */
.add-task-row { display: flex; gap: 6px; }
.add-task-row input { flex: 1; background: #1a1a28; border: 1px solid #252535; color: #e0e0e6; border-radius: 8px; padding: 7px 10px; font-size: 12px; outline: none; font-family: inherit; }
.add-task-row input::placeholder { color: #374151; }
.add-task-row input:focus { border-color: rgba(79,142,247,0.4); }
.add-btn { background: rgba(79,142,247,0.12); border: 1px solid rgba(79,142,247,0.25); color: #60a5fa; border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; font-family: inherit; transition: background 0.15s; }
.add-btn:hover { background: rgba(79,142,247,0.22); }
.add-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Command panel */
.cmd-textarea { width: 100%; background: #1a1a28; border: 1px solid #252535; color: #e0e0e6; border-radius: 8px; padding: 9px 10px; font-size: 12px; font-family: inherit; outline: none; resize: vertical; min-height: 72px; margin-bottom: 8px; }
.cmd-textarea::placeholder { color: #374151; }
.cmd-textarea:focus { border-color: rgba(79,142,247,0.4); }
.cmd-footer { display: flex; align-items: center; gap: 8px; }
.cmd-note { font-size: 10px; color: #374151; flex: 1; }
.cmd-sent { font-size: 10px; color: #22c55e; display: none; }
.send-btn { background: rgba(79,142,247,0.12); border: 1px solid rgba(79,142,247,0.25); color: #60a5fa; border-radius: 8px; padding: 7px 14px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; transition: background 0.15s; white-space: nowrap; }
.send-btn:hover { background: rgba(79,142,247,0.22); }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.hyper-note { font-size: 10px; color: #374151; margin-top: 6px; padding: 6px 8px; background: rgba(124,58,237,0.06); border-radius: 6px; border: 1px solid rgba(124,58,237,0.1); }

/* Command Log */
.cmd-log-list { display: flex; flex-direction: column; gap: 8px; }
.cmd-log-item { display: flex; gap: 10px; padding: 10px 12px; background: #14141f; border: 1px solid #1e1e2e; border-radius: 10px; align-items: flex-start; }
.cmd-log-emoji { font-size: 17px; flex-shrink: 0; width: 24px; text-align: center; margin-top: 1px; }
.cmd-log-body { flex: 1; min-width: 0; }
.cmd-log-hdr { display: flex; gap: 8px; align-items: baseline; margin-bottom: 3px; }
.cmd-log-agent { font-size: 12px; font-weight: 600; color: #9ca3af; }
.cmd-log-time { font-size: 10px; color: #374151; font-family: 'SF Mono', monospace; }
.cmd-log-msg { font-size: 12px; color: #6b7280; line-height: 1.5; word-break: break-word; }
.cmd-log-empty { font-size: 12px; color: #374151; font-style: italic; padding: 12px; text-align: center; background: #14141f; border: 1px solid #1e1e2e; border-radius: 10px; }

/* Handoff table */
.handoff-table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { text-align: left; padding: 8px 12px; font-size: 10px; font-weight: 700; color: #374151; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #1e1e2e; }
td { padding: 10px 12px; border-bottom: 1px solid #1a1a28; color: #9ca3af; }
.dir-arrow { color: #374151; }
.empty-row td { text-align: center; color: #374151; font-style: italic; padding: 16px; }

/* Health */
.health-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
@media (min-width: 600px) { .health-grid { grid-template-columns: repeat(3, 1fr); } }
@media (min-width: 900px) { .health-grid { grid-template-columns: repeat(6, 1fr); } }
.health-tile { background: #14141f; border: 1px solid #1e1e2e; border-radius: 12px; padding: 14px 12px; text-align: center; }
.health-label { font-size: 9px; font-weight: 700; color: #374151; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
.health-val { font-size: 22px; font-weight: 800; font-family: 'SF Mono', monospace; margin-bottom: 4px; }
.health-sub { font-size: 10px; color: #374151; }
.green-text  { color: #4ade80; }
.amber-text  { color: #fbbf24; }
.red-text    { color: #f87171; }
.blue-text   { color: #60a5fa; }
.purple-text { color: #a78bfa; }
.cron-list { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
.cron-pill { font-size: 10px; background: #1e1e2e; border: 1px solid #2d2d3e; border-radius: 5px; padding: 2px 7px; color: #9ca3af; }
.health-wide { grid-column: 1 / -1; }

.data-note { font-size: 10px; color: #374151; text-align: center; margin-top: 24px; font-family: 'SF Mono', monospace; }
.data-note a { color: #4b5563; }
.demo-badge { background: rgba(245,158,11,0.12); color: #fbbf24; border: 1px solid rgba(245,158,11,0.2); border-radius: 6px; padding: 2px 8px; font-size: 10px; font-weight: 700; }
</style>
</head>
<body>
<div class="page">

<div class="header">
  <div class="header-left">
    <h1>🤖 Agent Command Center</h1>
    <p id="agentSubtitle">FKI AI Fleet · Loading...</p>
  </div>
  <div class="header-right">
    <a class="back-link" href="index.html">← HQ</a>
    <span class="last-updated" id="lastUpdated">—</span>
    <button class="refresh-btn" id="refreshBtn" onclick="loadData()">↻ Refresh</button>
  </div>
</div>

<div class="section-label">⭐ Attention</div>
<div class="priority-board" id="priorityBoard"><div class="priority-all-clear">Loading...</div></div>

<div class="section-label">Agents</div>
<div class="agent-grid" id="agentGrid"></div>

<div class="section-label">Command Log</div>
<div class="cmd-log-list" id="cmdLog"></div>

<div class="section-label">Handoff Queue</div>
<div class="handoff-table-wrap">
  <table>
    <thead><tr><th>From</th><th></th><th>To</th><th>Task</th><th>Status</th><th>Time</th></tr></thead>
    <tbody id="handoffBody"><tr class="empty-row"><td colspan="6">No pending handoffs</td></tr></tbody>
  </table>
</div>

<div class="section-label">System Health · Ivan iMac</div>
<div class="health-grid" id="healthGrid"></div>

<div class="data-note" id="dataNote">Connecting...</div>

</div>
<script>
const API_BASE = (window.location.hostname === 'dashboard.franchiseki.com' ||
                  window.location.hostname === 'localhost' ||
                  window.location.hostname === '127.0.0.1')
  ? '' : 'https://dashboard.franchiseki.com';

const STATUS_URLS = [
  'https://dashboard.franchiseki.com/hub/agent-status.json',
  'https://bennett-maxwell.github.io/advaita-agent-audit/hub/agent-status.json',
  'http://openclaws-imac.tail503ee0.ts.net:8800/hub/agent-status.json'
];

const EMOJIS = { mack:'💻', leo:'🦁', ivan:'🖥️', tiffany:'🔮', chad:'⚡', reed:'📡', hyper:'🚀' };

const HYPER_FALLBACK = {
  id:'hyper', name:'Hyper', emoji:'🚀', role:'External Agent', model:'Hyper AI',
  machine:'External', status:'unknown', tasks_running:0, tasks_max:4,
  current_task:null, current_skill:null, last_active_rel:'manual', memory_updated_rel:'manual',
  notion_project:null, color_class:'hyper-color', text_class:'hyper-color-text', tasks:[]
};

const FALLBACK_DATA = {
  updated: new Date().toISOString(), demo_mode: true,
  agents: [
    {id:'mack',name:'Mack',emoji:'💻',role:'Strategy & Config',model:'claude-sonnet-4-6',machine:'MacBook (temp)',status:'idle',tasks_running:0,tasks_max:5,current_task:null,current_skill:null,last_active_rel:'unknown',memory_updated_rel:'unknown',notion_project:null,color_class:'mack-color',text_class:'mack-color-text',tasks:[]},
    {id:'leo',name:'Leo',emoji:'🦁',role:'Advisor · #leo-coaches',model:'claude-haiku-4-5',machine:'Ivan iMac',status:'idle',tasks_running:0,tasks_max:5,current_task:null,current_skill:null,last_active_rel:'unknown',memory_updated_rel:'unknown',notion_project:null,color_class:'leo-color',text_class:'leo-color-text',tasks:[]},
    {id:'ivan',name:'Ivan',emoji:'🖥️',role:'Cron & File Access',model:'iMac (OpenClaw)',machine:'iMac 100.103.51.12',status:'active',tasks_running:3,tasks_max:5,current_task:'Crons active',current_skill:'autopilot-skill',last_active_rel:'just now',memory_updated_rel:'15m ago',notion_project:'Sprint Board',color_class:'ivan-color',text_class:'ivan-color-text',tasks:[]},
    {id:'tiffany',name:'Tiffany',emoji:'🔮',role:'Background Pipeline',model:'gemini-2.5-flash',machine:'HP Omen',status:'offline',tasks_running:0,tasks_max:5,current_task:null,current_skill:'tiffany-fdd-supervisor',last_active_rel:'offline',memory_updated_rel:'unknown',notion_project:'Demi Territory Engine',color_class:'tiffany-color',text_class:'tiffany-color-text',tasks:[]},
    {id:'chad',name:'Chad',emoji:'⚡',role:'Codex · ChatGPT',model:'o3 / GPT-5',machine:'Ivan iMac (ghl-mcp)',status:'idle',tasks_running:0,tasks_max:5,current_task:null,current_skill:null,last_active_rel:'unknown',memory_updated_rel:'unknown',notion_project:null,color_class:'chad-color',text_class:'chad-color-text',tasks:[]},
    {id:'reed',name:'Reed',emoji:'📡',role:'Pulse · Lead Monitor',model:'gemini-2.5-flash',machine:'Ivan iMac',status:'idle',tasks_running:0,tasks_max:5,current_task:null,current_skill:null,last_active_rel:'unknown',memory_updated_rel:'unknown',notion_project:'LinkedIn → GHL Pipeline',color_class:'reed-color',text_class:'reed-color-text',tasks:[]},
    HYPER_FALLBACK
  ],
  handoffs:[], command_log:[],
  system:{ivan_cpu_pct:0,ivan_ram_pct:0,ivan_disk_pct:0,mack_swap_gb:0,active_crons:0,active_cron_names:[],tiffany_ollama_status:'offline',ivan_launchagents_active:0,ivan_python_procs:0,ivan_cloudflared_procs:0,claude_sessions_mack:0,claude_sessions_ivan:0}
};

let autoTimer = null;

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function relTime(iso) {
  try {
    const s = Math.floor((Date.now() - new Date(iso)) / 1000);
    if (s < 0)    return 'just now';
    if (s < 60)   return 'just now';
    if (s < 3600) return `${Math.floor(s/60)}m ago`;
    if (s < 86400) return `${Math.floor(s/3600)}h ago`;
    return `${Math.floor(s/86400)}d ago`;
  } catch { return '—'; }
}
function badge(status) {
  const m = { active:['badge-active','Active'], idle:['badge-idle','Idle'], offline:['badge-offline','Offline'], unknown:['badge-unknown','External'] };
  const [cls, lbl] = m[status] || m.unknown;
  return `<span class="status-badge ${cls}"><span class="badge-dot"></span>${lbl}</span>`;
}
function slots(running, max, status) {
  let h = '';
  for (let i=0; i<max; i++) h += `<div class="slot ${i<running ? 'used '+status+'-agent' : ''}"></div>`;
  return h;
}

function renderPriority(data) {
  const el = document.getElementById('priorityBoard');
  const items = [];
  const sys = data.system || {};

  const offlineAgents = (data.agents||[]).filter(a => a.status === 'offline');
  if (offlineAgents.length)
    items.push({ urgent:true, title:`${offlineAgents.map(a=>a.name).join(', ')} offline`, sub:'Agent(s) not responding — check machine or restart' });

  if ((sys.ivan_cpu_pct||0) > 80)
    items.push({ urgent:true, title:`Ivan CPU at ${sys.ivan_cpu_pct}%`, sub:'High load — check active crons or kill runaway process' });

  if ((sys.mack_swap_gb||0) > 6)
    items.push({ urgent:true, title:`Mack swap at ${sys.mack_swap_gb}GB`, sub:'Memory pressure — close sessions if needed' });

  const withTasks = (data.agents||[]).filter(a => (a.tasks||[]).filter(t=>t.status!=='done').length > 0);
  if (withTasks.length) {
    const total = withTasks.reduce((n,a) => n + (a.tasks||[]).filter(t=>t.status!=='done').length, 0);
    items.push({ urgent:false, title:`${total} task(s) tracked in command center`, sub:withTasks.map(a=>`${a.name} (${(a.tasks||[]).filter(t=>t.status!=='done').length})`).join(', ') });
  }

  if ((sys.active_crons||0) > 0)
    items.push({ urgent:false, title:`${sys.active_crons} crons active on Ivan`, sub:(sys.active_cron_names||[]).slice(0,6).join(', ') + ((sys.active_cron_names||[]).length>6 ? '...' : '') });

  if (!items.length) {
    el.innerHTML = '<div class="priority-all-clear">✅ All systems nominal</div>';
    return;
  }
  el.innerHTML = '<div class="priority-board-title">⭐ Needs Attention</div>' +
    items.slice(0,4).map((it,i) => `
      <div class="priority-item ${it.urgent ? 'priority-urgent' : 'priority-info'}">
        <div class="priority-num">${i+1}</div>
        <div><div class="priority-title">${esc(it.title)}</div><div class="priority-sub">${esc(it.sub)}</div></div>
      </div>`).join('');
}

function renderAgents(agents) {
  document.getElementById('agentSubtitle').textContent = 'FKI AI Fleet · ' + agents.map(a=>a.name).join(' · ');
  const grid = document.getElementById('agentGrid');
  grid.innerHTML = agents.map(a => {
    const tasks = a.tasks || [];
    const activeTasks = tasks.filter(t => t.status !== 'done');
    const taskCountStr = `(${activeTasks.length}/4)`;

    const taskListHtml = tasks.length === 0
      ? '<div class="task-empty">No tasks assigned</div>'
      : tasks.map(t => `
          <div class="task-item ${esc(t.status)}" id="ti-${esc(t.id)}">
            <div class="task-dot ${esc(t.status)}"></div>
            <div class="task-item-title">${esc(t.title)}</div>
            ${t.status !== 'done' ? `<button class="task-action complete" title="Mark done" onclick="completeTask('${esc(a.id)}','${esc(t.id)}')">✓</button>` : ''}
            <button class="task-action delete" title="Remove" onclick="deleteTask('${esc(a.id)}','${esc(t.id)}')">✕</button>
          </div>`).join('');

    const taskText = a.current_task
      ? `<span class="task-label">Current task</span>${esc(a.current_task)}`
      : `<span class="task-label">Current task</span><span style="color:#374151;font-style:italic;">Idle</span>`;

    const skillVal = a.current_skill
      ? `<span class="info-val active-text">${esc(a.current_skill)}</span>`
      : `<span class="info-val" style="font-style:italic;color:#374151;">—</span>`;

    const notionVal = a.notion_project
      ? `<span class="info-val highlight">${esc(a.notion_project)}</span>`
      : `<span class="info-val" style="font-style:italic;color:#374151;">—</span>`;

    return `
      <div class="agent-card ${esc(a.status)}" id="acard-${esc(a.id)}">
        <div class="agent-top">
          <div class="agent-avatar ${esc(a.color_class)}">${a.emoji}</div>
          <div class="agent-meta">
            <div class="agent-name ${esc(a.text_class)}">${esc(a.name)}</div>
            <div class="agent-model">${esc(a.model)}</div>
          </div>
          ${badge(a.status)}
        </div>
        <div class="task-slots-row">
          <span class="slots-label">Tasks (${a.tasks_running}/${a.tasks_max})</span>
          <div class="slots">${slots(a.tasks_running, a.tasks_max, a.status)}</div>
          <span class="slots-count">${a.tasks_running}/${a.tasks_max}</span>
        </div>
        <div class="current-task ${a.current_task ? 'has-task' : ''}">${taskText}</div>
        <div class="info-rows">
          <div class="info-row"><span class="info-key">Skill</span>${skillVal}</div>
          <div class="info-row"><span class="info-key">Notion</span>${notionVal}</div>
          <div class="info-row"><span class="info-key">Last active</span><span class="info-val">${esc(a.last_active_rel)}</span></div>
          <div class="info-row"><span class="info-key">Memory</span><span class="info-val">${esc(a.memory_updated_rel)}</span></div>
          <div class="info-row"><span class="info-key">Machine</span><span class="info-val" style="color:#4b5563;">${esc(a.machine)}</span></div>
        </div>
        <div class="panel-row">
          <button class="panel-btn" id="pb-tasks-${esc(a.id)}" onclick="togglePanel('${esc(a.id)}','tasks')">
            <span>📋 Tasks ${taskCountStr}</span><span class="chevron">▼</span>
          </button>
          <button class="panel-btn" id="pb-cmd-${esc(a.id)}" onclick="togglePanel('${esc(a.id)}','cmd')">
            <span>📤 Send</span><span class="chevron">▼</span>
          </button>
        </div>
        <div class="panel-body" id="panel-tasks-${esc(a.id)}">
          <div class="task-list" id="tl-${esc(a.id)}">${taskListHtml}</div>
          <div class="add-task-row">
            <input type="text" id="ti-input-${esc(a.id)}" placeholder="Add task for ${esc(a.name)}..." maxlength="200"
              onkeydown="if(event.key==='Enter')addTask('${esc(a.id)}')" />
            <button class="add-btn" id="ti-btn-${esc(a.id)}" onclick="addTask('${esc(a.id)}')">+ Add</button>
          </div>
          ${a.id === 'hyper' ? '<div class="hyper-note">Hyper Agent is external — status updated manually or via webhook. Use Send → to dispatch a command.</div>' : ''}
        </div>
        <div class="panel-body" id="panel-cmd-${esc(a.id)}">
          <textarea class="cmd-textarea" id="cmd-ta-${esc(a.id)}"
            placeholder="Command for ${esc(a.name)} via #leo-coaches..."></textarea>
          <div class="cmd-footer">
            <span class="cmd-note">→ Posts to #leo-coaches · Slack ts logged</span>
            <span class="cmd-sent" id="cmd-sent-${esc(a.id)}">✓ Sent to Slack</span>
            <button class="send-btn" id="cmd-btn-${esc(a.id)}" onclick="sendCommand('${esc(a.id)}')">Send →</button>
          </div>
        </div>
      </div>`;
  }).join('');
}

function renderCommandLog(log) {
  const el = document.getElementById('cmdLog');
  if (!log || !log.length) {
    el.innerHTML = '<div class="cmd-log-empty">No commands sent yet — use "Send →" on any agent card</div>';
    return;
  }
  el.innerHTML = log.slice(0,10).map(e => `
    <div class="cmd-log-item">
      <div class="cmd-log-emoji">${EMOJIS[e.agent_id] || '🤖'}</div>
      <div class="cmd-log-body">
        <div class="cmd-log-hdr">
          <span class="cmd-log-agent">${esc((e.agent_id||'').charAt(0).toUpperCase()+(e.agent_id||'').slice(1))}</span>
          <span class="cmd-log-time">${relTime(e.sent_at)}</span>
        </div>
        <div class="cmd-log-msg">${esc(e.message||'')}</div>
      </div>
    </div>`).join('');
}

function renderHandoffs(handoffs) {
  const tbody = document.getElementById('handoffBody');
  if (!handoffs || !handoffs.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="6">No pending handoffs</td></tr>';
    return;
  }
  tbody.innerHTML = handoffs.map(h => `
    <tr>
      <td>${esc(h.from)}</td><td class="dir-arrow">→</td><td>${esc(h.to)}</td>
      <td>${esc(h.task)}</td>
      <td><span class="status-badge ${h.status==='pending'?'badge-idle':'badge-active'}">${esc(h.status)}</span></td>
      <td style="font-family:monospace;font-size:10px;color:#4b5563;">${esc(h.time_rel)}</td>
    </tr>`).join('');
}

function renderHealth(sys) {
  if (!sys) return;
  const g = document.getElementById('healthGrid');
  const cpuC  = sys.ivan_cpu_pct>80?'red-text':sys.ivan_cpu_pct>50?'amber-text':'green-text';
  const ramC  = sys.ivan_ram_pct>85?'red-text':sys.ivan_ram_pct>65?'amber-text':'blue-text';
  const diskC = sys.ivan_disk_pct>85?'red-text':sys.ivan_disk_pct>70?'amber-text':'green-text';
  const swapC = sys.mack_swap_gb>8?'red-text':sys.mack_swap_gb>4?'amber-text':'green-text';
  const pills = (sys.active_cron_names||[]).map(c=>`<span class="cron-pill">${esc(c)}</span>`).join('');
  g.innerHTML = `
    <div class="health-tile"><div class="health-label">Ivan CPU</div><div class="health-val ${cpuC}">${sys.ivan_cpu_pct}%</div><div class="health-sub">iMac</div></div>
    <div class="health-tile"><div class="health-label">Ivan RAM</div><div class="health-val ${ramC}">${sys.ivan_ram_pct}%</div><div class="health-sub">Used</div></div>
    <div class="health-tile"><div class="health-label">Ivan Disk</div><div class="health-val ${diskC}">${sys.ivan_disk_pct}%</div><div class="health-sub">Used</div></div>
    <div class="health-tile"><div class="health-label">Mack Swap</div><div class="health-val ${swapC}">${sys.mack_swap_gb}G</div><div class="health-sub">MacBook</div></div>
    <div class="health-tile"><div class="health-label">Crons</div><div class="health-val purple-text">${sys.active_crons}</div><div class="health-sub">Active</div></div>
    <div class="health-tile"><div class="health-label">Sessions</div><div class="health-val blue-text">${(sys.claude_sessions_mack||0)+(sys.claude_sessions_ivan||0)}</div><div class="health-sub">M:${sys.claude_sessions_mack||0} I:${sys.claude_sessions_ivan||0}</div></div>
    <div class="health-tile health-wide"><div class="health-label">Cron Roster</div><div class="cron-list">${pills||'<span style="color:#374151;font-style:italic;font-size:11px;">No crons listed</span>'}</div></div>`;
}

function togglePanel(agentId, section) {
  const p = document.getElementById(`panel-${section}-${agentId}`);
  const b = document.getElementById(`pb-${section}-${agentId}`);
  if (!p || !b) return;
  const open = p.classList.contains('visible');
  p.classList.toggle('visible', !open);
  b.classList.toggle('open', !open);
}

async function apiPost(path, body) {
  const r = await fetch(API_BASE + path, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body), signal: AbortSignal.timeout(8000)
  });
  return r.json();
}

async function addTask(agentId) {
  const input = document.getElementById(`ti-input-${agentId}`);
  const btn   = document.getElementById(`ti-btn-${agentId}`);
  const title = (input?.value||'').trim();
  if (!title) return;
  btn.disabled = input.disabled = true;
  try {
    const r = await apiPost('/api/task/add', {agent_id:agentId, title});
    if (r.ok) {
      input.value = '';
      await loadData();
      const p = document.getElementById(`panel-tasks-${agentId}`);
      const b = document.getElementById(`pb-tasks-${agentId}`);
      if (p && !p.classList.contains('visible')) { p.classList.add('visible'); b?.classList.add('open'); }
    } else alert(r.error || 'Failed to add task');
  } catch { alert('Cannot reach Ivan API — check Tailscale or CF Tunnel'); }
  finally { btn.disabled = input.disabled = false; input?.focus(); }
}

async function completeTask(agentId, taskId) {
  try {
    await apiPost('/api/task/complete', {agent_id:agentId, task_id:taskId});
    await loadData();
    const p = document.getElementById(`panel-tasks-${agentId}`);
    const b = document.getElementById(`pb-tasks-${agentId}`);
    if (p && !p.classList.contains('visible')) { p.classList.add('visible'); b?.classList.add('open'); }
  } catch { alert('Cannot reach Ivan API'); }
}

async function deleteTask(agentId, taskId) {
  try {
    await apiPost('/api/task/delete', {agent_id:agentId, task_id:taskId});
    await loadData();
  } catch { alert('Cannot reach Ivan API'); }
}

async function sendCommand(agentId) {
  const ta   = document.getElementById(`cmd-ta-${agentId}`);
  const btn  = document.getElementById(`cmd-btn-${agentId}`);
  const sent = document.getElementById(`cmd-sent-${agentId}`);
  const msg  = (ta?.value||'').trim();
  if (!msg) return;
  btn.disabled = true; btn.textContent = 'Sending...';
  try {
    const r = await apiPost('/api/dispatch', {agent_id:agentId, message:msg});
    if (r.ok) {
      ta.value = ''; sent.style.display = 'inline';
      setTimeout(() => { sent.style.display = 'none'; }, 3500);
      await loadData();
    } else alert('Slack error: ' + (r.error || 'Unknown'));
  } catch { alert('Cannot reach Ivan API — check CF Tunnel'); }
  finally { btn.disabled = false; btn.textContent = 'Send →'; }
}

async function loadData() {
  const btn = document.getElementById('refreshBtn');
  btn.textContent = '↻ Loading...';

  // Preserve open panels
  const open = {};
  document.querySelectorAll('.panel-body.visible').forEach(el => { open[el.id] = true; });

  let data = null, usedUrl = null;
  for (const url of STATUS_URLS) {
    try {
      const r = await fetch(url + '?t=' + Date.now(), {signal: AbortSignal.timeout(5000)});
      if (r.ok) { data = await r.json(); usedUrl = url; break; }
    } catch {}
  }

  if (!data) {
    data = {...FALLBACK_DATA, updated: new Date().toISOString()};
    document.getElementById('dataNote').innerHTML =
      '<span class="demo-badge">DEMO</span> Ivan unreachable — showing fallback data. Check Tailscale or <a href="https://dashboard.franchiseki.com">dashboard.franchiseki.com</a>';
  } else {
    if (!(data.agents||[]).some(a => a.id === 'hyper')) data.agents = [...(data.agents||[]), HYPER_FALLBACK];
    const src = usedUrl.includes('franchiseki.com') ? 'dashboard.franchiseki.com' : usedUrl.includes('github.io') ? 'GitHub Pages' : 'Tailscale';
    document.getElementById('dataNote').innerHTML =
      `✓ Live · <a href="${usedUrl}">${src}</a> · auto-refresh 30s · updated ${relTime(data.updated)}`;
  }

  renderPriority(data);
  renderAgents(data.agents || []);
  renderCommandLog(data.command_log || []);
  renderHandoffs(data.handoffs || []);
  renderHealth(data.system || null);

  const lu = document.getElementById('lastUpdated');
  try {
    const dt = new Date(data.updated);
    lu.textContent = (data.demo_mode ? '⚠ ' : '✓ ') + dt.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',timeZone:'America/Denver',timeZoneName:'short'});
    lu.style.color = data.demo_mode ? '#f59e0b' : '#22c55e';
  } catch { lu.textContent = '—'; }

  // Restore open panels
  Object.keys(open).forEach(id => {
    const el = document.getElementById(id); if (!el) return;
    el.classList.add('visible');
    const parts = id.split('-');
    if (parts.length >= 3) {
      const btnId = `pb-${parts[1]}-${parts.slice(2).join('-')}`;
      document.getElementById(btnId)?.classList.add('open');
    }
  });

  btn.textContent = '↻ Refresh';
  clearTimeout(autoTimer);
  autoTimer = setTimeout(loadData, 30000);
}

loadData();
</script>
