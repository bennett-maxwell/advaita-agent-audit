<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legal Dashboard · FKI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0f;
    color: #e0e0e6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .gate-card {
    background: #14141f;
    border: 1px solid #3b82f633;
    border-radius: 20px;
    padding: 40px 36px;
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }
  .icon-wrap {
    width: 64px;
    height: 64px;
    background: #3b82f61a;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }
  h1 { font-size: 22px; font-weight: 700; color: #60a5fa; text-align: center; letter-spacing: -0.3px; }
  p.sub { font-size: 13px; color: #6b7280; text-align: center; line-height: 1.5; margin-top: -12px; }
  .input-wrap { width: 100%; position: relative; }
  input[type="password"] {
    width: 100%;
    background: #0f0f1a;
    border: 1px solid #3b82f630;
    border-radius: 10px;
    padding: 13px 48px 13px 16px;
    font-size: 15px;
    color: #e0e0e6;
    outline: none;
    transition: border-color 0.2s;
    font-family: 'SF Mono', 'Fira Code', monospace;
    letter-spacing: 2px;
  }
  input[type="password"]:focus { border-color: #3b82f680; box-shadow: 0 0 0 3px rgba(59,130,246,0.08); }
  input[type="password"].error { border-color: #ef4444; animation: shake 0.3s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  .toggle-pw { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #6b7280; font-size: 16px; padding: 4px; }
  .toggle-pw:hover { color: #9ca3af; }
  button.submit {
    width: 100%; background: #3b82f6; color: #fff;
    font-size: 15px; font-weight: 600; border: none; border-radius: 10px;
    padding: 13px; cursor: pointer; transition: background 0.2s, transform 0.1s;
  }
  button.submit:hover { background: #2563eb; }
  button.submit:active { transform: scale(0.98); }
  button.submit:disabled { background: #3b82f660; cursor: not-allowed; }
  .error-msg { font-size: 13px; color: #f87171; text-align: center; display: none; }
  .error-msg.show { display: block; }
  .back-link { font-size: 12px; color: #4b5563; text-decoration: none; display: flex; align-items: center; gap: 4px; margin-top: -8px; }
  .back-link:hover { color: #9ca3af; }
  .loading { display: none; align-items: center; gap: 8px; font-size: 13px; color: #60a5fa; }
  .loading.show { display: flex; }
  .spinner { width: 16px; height: 16px; border: 2px solid #3b82f630; border-top-color: #60a5fa; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .confidential-note {
    font-size: 10px;
    color: #374151;
    text-align: center;
    border-top: 1px solid #1e1e2e;
    padding-top: 16px;
    width: 100%;
    line-height: 1.6;
  }
</style>
</head>
<body>
<div class="gate-card">
  <div class="icon-wrap">⚖️</div>
  <h1>Legal Dashboard</h1>
  <p class="sub">Attorney-client privileged. Bennett Maxwell access only.</p>

  <div class="input-wrap">
    <input type="password" id="pw" placeholder="Password" autofocus autocomplete="current-password" />
    <button class="toggle-pw" type="button" onclick="togglePw()" title="Show/hide">👁</button>
  </div>

  <div class="error-msg" id="errMsg">Incorrect password. Try again.</div>

  <button class="submit" id="submitBtn" onclick="handleSubmit()">Unlock Legal →</button>

  <div class="loading" id="loadingMsg">
    <div class="spinner"></div>
    Opening legal dashboard...
  </div>

  <a class="back-link" href="index.html">← Back to Command Center</a>

  <div class="confidential-note">
    ⚠ Confidential · Attorney-Client Privileged · Do Not Distribute<br>
    Tailscale-only · Haslam Law Group · Bennett Maxwell
  </div>
</div>

<script>
  // SHA-256 of "legal 2026"
  const TARGET = '2505432d39679af270da2bf753da0067c48ff3fb87599eae65d6cbf59f9dcfb8';
  const LEGAL_URL = 'http://openclaws-imac.tail503ee0.ts.net:8733/legal-command-center.html';
  const SESSION_KEY = 'fki_legal_auth';

  if (sessionStorage.getItem(SESSION_KEY) === 'ok') {
    window.location.href = LEGAL_URL;
  }

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  async function handleSubmit() {
    const pw = document.getElementById('pw').value;
    if (!pw) return;
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    const hash = await sha256(pw);
    if (hash === TARGET) {
      sessionStorage.setItem(SESSION_KEY, 'ok');
      document.getElementById('errMsg').classList.remove('show');
      document.getElementById('loadingMsg').classList.add('show');
      btn.style.display = 'none';
      setTimeout(() => { window.location.href = LEGAL_URL; }, 400);
    } else {
      const input = document.getElementById('pw');
      input.classList.add('error');
      document.getElementById('errMsg').classList.add('show');
      btn.disabled = false;
      setTimeout(() => input.classList.remove('error'), 400);
      input.value = '';
      input.focus();
    }
  }

  document.getElementById('pw').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleSubmit();
  });

  function togglePw() {
    const input = document.getElementById('pw');
    input.type = input.type === 'password' ? 'text' : 'password';
  }
</script>
</body>
</html>
