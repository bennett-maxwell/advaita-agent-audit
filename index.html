<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="0; url=/hub/">
<link rel="canonical" href="https://dashboard.franchiseki.com/hub/">
<title>FKI Command Center</title>
<style>
:root {
  --bg: #0d0f14;
  --card: #1e2230;
  --border: #2a2f3e;
  --text: #eef2f7;
  --muted: #9aa5b5;
  --accent: #4f8ef7;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 24px;
  background:
    radial-gradient(circle at top left, rgba(79, 142, 247, 0.20), transparent 30rem),
    linear-gradient(180deg, #0d0f14, #11151e);
  color: var(--text);
  font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
.card {
  width: min(520px, 100%);
  padding: 24px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: rgba(30, 34, 48, 0.92);
  text-align: center;
}
h1 {
  margin: 0 0 8px;
  font-size: clamp(28px, 8vw, 44px);
  letter-spacing: -0.05em;
}
p {
  margin: 0 0 18px;
  color: var(--muted);
  font-size: 15px;
  line-height: 1.5;
}
a {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 44px;
  padding: 10px 14px;
  border: 1px solid rgba(79, 142, 247, 0.42);
  border-radius: 8px;
  color: #d9e8ff;
  background: rgba(79, 142, 247, 0.14);
  font-size: 14px;
  font-weight: 800;
  text-decoration: none;
}
</style>
</head>
<body>
<main class="card">
  <h1>FKI Command Center</h1>
  <p>Redirecting to the master dashboard hub.</p>
  <a href="/hub/">Open Command Center</a>
</main>
<script>
window.location.replace("/hub/");
</script>
</body>
</html>
